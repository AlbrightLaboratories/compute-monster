name: provision-verify
# Runs ON the compute-monster box (self-hosted). Reboot-safe: it kicks the
# self-healing provisioner as a DETACHED transient unit (so the NVIDIA reboot
# doesn't kill this job), then reports current VERIFY state + dumps logs so we
# can iterate remotely.
on:
  workflow_dispatch:
  push:
    paths:
      - 'provision/**'

jobs:
  provision:
    runs-on: [self-hosted, compute-monster]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest + kick provisioning (detached, survives reboot)
        run: |
          sudo git -C /opt/compute-monster pull || true
          sudo systemd-run --unit cm-provision --collect --no-block \
            bash /opt/compute-monster/provision/firstboot.sh || true
          sleep 25

      - name: Verify current state (non-fatal)
        run: sudo bash /opt/compute-monster/provision/VERIFY.sh || true

      - name: Dump provisioning logs
        if: always()
        run: |
          echo "===== per-step logs ====="
          sudo tail -n +1 /opt/compute-monster/provision/log/* 2>/dev/null || echo "(none yet)"
          echo "===== service journal ====="
          sudo journalctl -u compute-monster-provision -u cm-provision --no-pager 2>/dev/null | tail -200 || true
          echo "===== nvidia / rgb quick check ====="
          nvidia-smi -L 2>&1 || echo "nvidia-smi: not ready"
          sudo openrgb --list-devices 2>&1 | head -120 || echo "openrgb: not installed yet"
          echo "--- meteor targets ---"
          sudo journalctl -u openrgb-meteor --no-pager 2>/dev/null | grep -iE "animating|error|no rgb|zone" | tail -20 || true
          echo "===== block devices / storage ====="
          lsblk -o NAME,SIZE,FSTYPE,LABEL,UUID,MOUNTPOINT 2>&1 || true
          echo "--- fstab data ---"; grep -i data /etc/fstab 2>&1 || true
          echo "--- rgb services ---"; systemctl is-active openrgb-server openrgb-meteor 2>&1 || true
          echo "===== USB / Lian Li hub detection ====="
          openrgb --version 2>&1 | head -2 || true
          lsusb 2>&1 || true
          echo "--- Lian Li vid 0cf2 ? ---"; lsusb -d 0cf2: 2>&1 || echo "no 0cf2 device on USB bus"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provision-logs
          path: /opt/compute-monster/provision/log/
          if-no-files-found: ignore
